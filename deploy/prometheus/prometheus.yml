global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: gateway
    static_configs:
      - targets: ["gateway:8080"]
        labels:
          environment: demo
          service: api-gateway

  - job_name: order
    static_configs:
      - targets: ["order:8081"]
        labels:
          environment: demo
          service: order-service

  - job_name: inventory
    static_configs:
      - targets: ["inventory:8082"]
        labels:
          environment: demo
          service: inventory-service
